apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference-api
  namespace: llm-sidecar
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inference-api
  template:
    metadata:
      labels:
        app: inference-api
    spec:
      initContainers:
      - name: download-model
        image: llm-mvp-registry:5000/model-downloader:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: MODEL_ID
          valueFrom:
            configMapKeyRef:
              name: inference-config
              key: model-id
        - name: HF_HOME
          value: "/models/hf"
        - name: HF_HUB_CACHE
          value: "/models/hf"
        volumeMounts:
        - name: model-storage
          mountPath: /models
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
            ephemeral-storage: "1Gi"
          limits:
            ephemeral-storage: "2Gi"

      containers:
      - name: vllm-server
        image: llm-mvp-registry:5000/vllm:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8001
          name: inference
        env:
        - name: MODEL_ID
          valueFrom:
            configMapKeyRef:
              name: inference-config
              key: model-id
        - name: HF_HOME
          value: "/models/hf"
        - name: HF_HUB_CACHE
          value: "/models/hf"
        volumeMounts:
        - name: model-storage
          mountPath: /models
        resources:
          requests:
            memory: "4Gi"
            cpu: "1"
            ephemeral-storage: "2Gi"
          limits:
            ephemeral-storage: "4Gi"
        livenessProbe:
          tcpSocket:
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10

        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5

      - name: fastapi-sidecar
        image: llm-mvp-registry:5000/fastapi-api:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
          name: api
        env:
        - name: INFERENCE_HOST
          value: "localhost"
        - name: INFERENCE_PORT
          value: "8001"
        - name: MODEL_ID
          valueFrom:
            configMapKeyRef:
              name: inference-config
              key: model-id
        - name: SYSTEM_MESSAGE
          valueFrom:
            configMapKeyRef:
              name: inference-config
              key: system-message
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
            ephemeral-storage: "512Mi"
          limits:
            ephemeral-storage: "1Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5

      volumes:
      - name: model-storage
        persistentVolumeClaim:
          claimName: model-storage